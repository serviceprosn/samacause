<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
     <meta name="description" content="Sunu Yité - Plateforme web et mobile de mobilisation citoyenne et de financement participatif solidaire au Sénégal. Pétitions sécurisées par OTP SMS, transparence totale des dépenses, et dons via Wave, Orange Money et Stripe." />
    <meta name="theme-color" content="#00853F" />
    
    <title>Sunu Yité | Mobilisation Citoyenne au Sénégal</title>
    <script>
      // Redirect vercel.app to custom domain sunuyite.fun
      if (window.location.hostname === 'sunuyite.vercel.app') {
        window.location.replace('https://sunuyite.fun' + window.location.pathname + window.location.search + window.location.hash);
      }

      // Force unregistration of old PWA Service Workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function(success) {
              if (success) {
                console.log('Old Service Worker unregistered successfully.');
              }
            });
          }
        });
      }
      // Clear cache storage to remove cached API responses/assets
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
