<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
     <meta name="description" content="Sunu Yité - Plateforme web et mobile de mobilisation citoyenne et de financement participatif solidaire au Sénégal. Pétitions sécurisées par OTP SMS, transparence totale des dépenses, et dons via Wave, Orange Money et Stripe." />
    <meta name="theme-color" content="#00853F" />
    
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sunu Yité" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <title>Sunu Yité | Mobilisation Citoyenne au Sénégal</title>
    
    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('SW enregistré avec succès ! Scope:', reg.scope);
              
              // Check for service worker updates every 1 minute
              setInterval(() => {
                reg.update();
              }, 1000 * 60 * 1);

              // Update detection
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        // Prompt user to update
                        if (confirm("Une nouvelle version de l'application Sunu Yité est disponible. Souhaitez-vous mettre à jour maintenant ?")) {
                          window.location.reload();
                        }
                      }
                    }
                  };
                }
              };
            })
            .catch((err) => console.error('SW échec d\'enregistrement :', err));

          // Reload page when the new Service Worker takes over control
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
